{% extends "base.html" %}
{% block title %}Resume Builder – Smart Job Guard{% endblock %}

{% block content %}

<div class="builder-wrapper">

  <h2 class="page-title">Choose Your Template</h2>

  <!-- Filters -->
  <div class="template-tabs">
    <button class="tab-btn active" data-filter="all">All</button>
    <button class="tab-btn" data-filter="ats">ATS-Friendly</button>
    <button class="tab-btn" data-filter="modern">Modern</button>
    <button class="tab-btn" data-filter="minimal">Minimal</button>
  </div>

  <!-- Templates -->
  <div id="templateList" class="template-grid"></div>

  <!-- Continue -->
  <div class="builder-footer">
    <button id="goEdit" class="btn btn-primary" disabled>
      Continue →
    </button>
  </div>

</div>

<script>
  const templates = {{ templates|tojson|safe }};
  let selectedTemplate = templates[0];

  const templateTags = {
    "Modern Professional Template": "modern",
    "Clean Minimal Template": "minimal",
    "Executive Format": "ats",
    "Corporate ATS Layout": "ats",
    "Tech Developer Format": "modern",
    "One-Page ATS Template": "ats"
  };

  function generateTemplateCard(name) {
    const card = document.createElement('div');
    card.className = 'template-item';

    const tag = templateTags[name] || 'all';
    card.dataset.tag = tag;

    card.innerHTML = `
      <div class='template-thumb'></div>
      <strong>${name}</strong>
      <div class='template-meta'>
        <span class='badge'>${tag.toUpperCase()}</span>
        <span class='rating'>4.8/5</span>
      </div>
      <button class='btn select-template-btn'>Select</button>
    `;

    card.addEventListener('click', () => {
      selectedTemplate = name;
      document.querySelectorAll('.template-item').forEach(i =>
        i.classList.remove('selected-template')
      );
      card.classList.add('selected-template');
      document.getElementById('goEdit').disabled = false;
    });

    return card;
  }

  function loadTemplateList(filter = 'all') {
    const list = document.getElementById('templateList');
    list.innerHTML = '';

    templates.forEach(name => {
      const card = generateTemplateCard(name);
      if (filter === 'all' || card.dataset.tag === filter) {
        list.appendChild(card);
      }
    });
  }

  document.getElementById('goEdit').addEventListener('click', () => {
    let query = '/resume_builder/edit?template=' + encodeURIComponent(selectedTemplate);
    window.location.href = query;
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadTemplateList(btn.dataset.filter);
    });
  });

  loadTemplateList();

  // theme load
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.body.classList.add(saved);
  }
</script>

{% endblock %}
